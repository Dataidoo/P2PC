<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#2a2330">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P2PC">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icons/app-icon-192.png">
<title>P2PC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fraunces:ital,wght@0,700;0,800;0,900;1,800;1,900&family=JetBrains+Mono:wght@500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #2a2330;
    --bg-deeper:    #1f1a25;
    --bg-lift:      #34293c;
    --bg-lift-2:    #3d3144;
    --shadow-dark:  #14101a;
    --shadow-light: #3d3245;

    --ink:          #f0e7d6;
    --ink-soft:     #c5b9a4;
    --ink-faint:    #8a7e6e;

    --olive:        #93a06f;
    --olive-deep:   #6d7d4f;
    --coral:        #e87c5b;
    --coral-soft:   #ff9d7e;
    --mauve:        #c89bd1;

    --danger: #e15454;
    --warn:   #d4a04e;

    --r:    16px;
    --r-lg: 26px;
    --r-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    padding: 22px 16px 40px;
    overflow-x: hidden;
    background:
      radial-gradient(ellipse at 12% 8%,  rgba(232,124,91,0.10) 0%, transparent 42%),
      radial-gradient(ellipse at 88% 92%, rgba(147,160,111,0.10) 0%, transparent 50%),
      var(--bg);
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1, h2 { font-family: 'Fraunces', serif; letter-spacing: -0.01em; }

  /* ===== TOP BAR ===== */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    margin-bottom: 22px;
  }
  .topbar .slot-left  { justify-self: start; }
  .topbar .slot-mid   { justify-self: center; }
  .topbar .slot-right { justify-self: end; }

  .contacts-btn {
    border: none;
    background: var(--bg);
    color: var(--ink);
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.06em;
    padding: 11px 16px;
    border-radius: 999px;
    box-shadow: 5px 5px 12px var(--shadow-dark), -4px -4px 12px var(--shadow-light);
    display: inline-flex; align-items: center; gap: 8px;
    transition: all 0.18s;
  }
  .contacts-btn:hover { color: var(--coral); transform: translateY(-1px); }
  .contacts-btn:active { box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light); transform: translateY(0); }
  .contacts-btn .badge {
    background: var(--coral);
    color: var(--bg-deeper);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(26px, 4vw, 36px);
    color: var(--ink);
    line-height: 1;
    text-align: center;
  }
  .logo span { color: var(--coral); }
  .logo-sub {
    font-family: 'Caveat', cursive;
    font-size: 13px;
    color: var(--olive);
    margin-top: 2px;
    text-align: center;
  }

  .me-cluster {
    display: inline-flex; align-items: center; gap: 11px;
    padding: 5px 16px 5px 5px;
    border-radius: 999px;
    background: var(--bg);
    box-shadow: 5px 5px 12px var(--shadow-dark), -4px -4px 12px var(--shadow-light);
    cursor: pointer;
    transition: all 0.18s;
  }
  .me-cluster:hover { transform: translateY(-1px); }
  .me-cluster:active { box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light); }
  .me-cluster .av {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--coral), var(--olive));
    background-size: cover; background-position: center;
    color: var(--bg-deeper);
    display: grid; place-items: center;
    font-weight: 900; font-size: 17px;
    text-transform: uppercase;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 3px var(--bg);
  }
  .me-cluster .id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    .topbar { grid-template-columns: auto 1fr auto; gap: 8px; }
    .logo-sub { display: none; }
    .me-cluster .id { display: none; }
    .me-cluster { padding: 4px; }
    .me-cluster .av { width: 40px; height: 40px; font-size: 15px; }
    .contacts-btn { padding: 9px 13px; font-size: 11px; }
  }

  /* ===== ACTIONS ===== */
  .actions {
    display: flex; gap: 10px;
    justify-content: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .action-btn {
    border: none;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 12.5px;
    letter-spacing: 0.06em;
    padding: 12px 22px;
    border-radius: 999px;
    transition: all 0.18s;
  }
  .action-btn.primary {
    background: var(--coral);
    color: var(--bg-deeper);
    box-shadow: 5px 5px 12px var(--shadow-dark);
  }
  .action-btn.primary:hover { background: var(--coral-soft); transform: translateY(-2px); }
  .action-btn.primary:active { transform: translateY(0); box-shadow: inset 3px 3px 8px rgba(0,0,0,0.3); }
  .action-btn.ghost {
    background: var(--bg);
    color: var(--olive);
    box-shadow: 5px 5px 12px var(--shadow-dark), -4px -4px 12px var(--shadow-light);
  }
  .action-btn.ghost:hover { color: var(--olive-deep); transform: translateY(-2px); }
  .action-btn.ghost:active { box-shadow: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light); transform: translateY(0); }

  /* ===== CHAT CARDS — TIGHTER ===== */
  .stack { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }

  .win {
    border-radius: var(--r-lg);
    padding: 16px 18px;          /* tighter */
    position: relative;
    overflow: hidden;
    box-shadow: 8px 8px 20px var(--shadow-dark), -6px -6px 20px var(--shadow-light);
  }
  .win:nth-child(odd)  { background: var(--bg-lift);   }
  .win:nth-child(even) { background: var(--bg-lift-2); }

  .win::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .win.mode-private::before { background: linear-gradient(90deg, transparent, var(--coral), transparent); }
  .win.mode-group::before   { background: linear-gradient(90deg, transparent, var(--olive), transparent); }
  .win.mode-public::before  { background: linear-gradient(90deg, transparent, var(--mauve), transparent); }

  .win-top {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .win-head { flex: 1; min-width: 0; }
  .win-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .win-title.empty { color: var(--ink-faint); font-style: italic; font-weight: 700; }
  .win-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 1px;
  }
  .win-mode-dot {
    width: 9px; height: 9px; border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 7px currentColor;
  }
  .win.mode-private .win-mode-dot { background: var(--coral);  color: var(--coral); }
  .win.mode-group   .win-mode-dot { background: var(--olive);  color: var(--olive); }
  .win.mode-public  .win-mode-dot { background: var(--mauve);  color: var(--mauve); }

  .win-demo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--warn);
    color: var(--bg-deeper);
    text-transform: uppercase;
    font-weight: 800;
    flex: none;
  }

  /* ===== MODE PICKER ===== */
  .mode-picker { text-align: center; padding: 10px 4px 4px; }
  .mode-tabs {
    display: inline-flex;
    background: var(--bg-deeper);
    border-radius: 999px;
    padding: 4px;
    box-shadow: inset 4px 4px 10px rgba(0,0,0,0.4), inset -3px -3px 10px var(--shadow-light);
    gap: 3px;
  }
  .mode-tabs button {
    border: none; background: transparent;
    color: var(--ink-soft);
    font-family: 'Manrope', sans-serif;
    font-weight: 700; font-size: 11.5px;
    padding: 9px 20px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tabs button:hover { color: var(--ink); }

  /* ===== SETUP ===== */
  .setup {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 4px;
  }
  .setup input[type="text"] {
    background: var(--bg-deeper);
    border: none;
    border-radius: var(--r-sm);
    padding: 10px 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    width: 100%;
    font-weight: 600;
    box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4), inset -2px -2px 8px var(--shadow-light);
  }
  .setup input::placeholder { color: var(--ink-faint); font-weight: 500; }
  .id-list { display: flex; flex-direction: column; gap: 4px; max-height: 110px; overflow-y: auto; }
  .id-chip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 11px;
    border-radius: var(--r-sm);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    background: var(--bg);
    font-weight: 600;
  }
  .id-chip .x { cursor: pointer; color: var(--ink-faint); font-size: 13px; padding: 0 5px; }
  .id-chip .x:hover { color: var(--danger); }
  .setup-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 3px; }

  /* ===== CHAT BOX — TIGHTER ===== */
  .chat-wrap {
    background: var(--bg-deeper);
    border-radius: var(--r);
    padding: 10px;        /* tighter */
    box-shadow: inset 4px 4px 10px rgba(0,0,0,0.45), inset -3px -3px 10px var(--shadow-light);
  }
  .messages {
    min-height: 200px; max-height: 50vh;
    overflow-y: auto;
    display: flex; flex-direction: column;
    gap: 6px;
    padding: 4px 4px 6px;
    margin-bottom: 8px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--ink-faint); opacity: 0.4; border-radius: 2px; }

  .msg {
    max-width: 80%;
    padding: 8px 12px;       /* tighter */
    border-radius: 12px;
    font-size: 13px;         /* slightly smaller */
    line-height: 1.45;
    word-wrap: break-word;
    animation: msgIn 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    background: var(--bg);
    color: var(--ink);
    box-shadow: 3px 3px 7px rgba(0,0,0,0.4);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg .who {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    margin-bottom: 2px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .msg.mine {
    align-self: flex-end;
    color: var(--bg-deeper);
    font-weight: 600;
  }
  .win.mode-private .msg.mine { background: var(--coral); }
  .win.mode-group   .msg.mine { background: var(--olive); }
  .win.mode-public  .msg.mine { background: var(--mauve); }
  .msg.mine .who { color: rgba(31,26,37,0.6); }
  .msg.theirs { align-self: flex-start; }

  /* CHAT IMAGES — capped so they don't blow up the thread */
  .msg-img {
    max-width: 180px;
    max-height: 220px;
    object-fit: cover;
    border-radius: 9px;
    display: block;
    margin-top: 4px;
    cursor: pointer;
    transition: transform 0.18s;
  }
  .msg-img:hover { transform: scale(1.03); }

  .sys-msg {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 3px 0;
    font-weight: 700;
  }
  .sys-msg::before, .sys-msg::after { content: '·'; margin: 0 8px; }

  .compose {
    display: flex; gap: 8px; align-items: center;
  }
  .compose input {
    flex: 1;
    background: var(--bg);
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 12.5px;
    color: var(--ink);
    outline: none;
    font-weight: 500;
    box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4), inset -2px -2px 8px var(--shadow-light);
  }
  .compose input::placeholder { color: var(--ink-faint); }
  .send-btn {
    color: var(--bg-deeper);
    border: none; border-radius: 50%;
    width: 38px; height: 38px;
    cursor: pointer; font-size: 15px;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .win.mode-private .send-btn { background: var(--coral); box-shadow: 3px 3px 9px rgba(0,0,0,0.4); }
  .win.mode-group   .send-btn { background: var(--olive); box-shadow: 3px 3px 9px rgba(0,0,0,0.4); }
  .win.mode-public  .send-btn { background: var(--mauve); box-shadow: 3px 3px 9px rgba(0,0,0,0.4); }
  .send-btn:active { box-shadow: inset 3px 3px 6px rgba(0,0,0,0.4); }

  /* ===== ICON BUTTONS — flat, outline, no chrome ===== */
  .win-ctrls {
    display: flex; gap: 6px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ico-btn {
    background: transparent;
    border: 1.5px solid var(--ink-faint);
    color: var(--ink-soft);
    cursor: pointer;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid; place-items: center;
    transition: all 0.16s;
    flex-shrink: 0;
  }
  .ico-btn:hover {
    border-color: var(--coral);
    color: var(--coral);
  }
  .ico-btn:active {
    transform: scale(0.92);
  }
  .ico-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* lock + close — slightly bigger, on the right side */
  .ico-spacer { flex: 1; }
  .ico-lock, .ico-close {
    width: 40px; height: 40px;
    border-width: 1.5px;
  }
  .ico-lock svg, .ico-close svg { width: 18px; height: 18px; }
  .ico-lock.on {
    color: var(--warn);
    border-color: var(--warn);
  }
  .ico-close {
    color: var(--danger);
    border-color: var(--danger);
  }
  .ico-close:hover {
    background: var(--danger);
    color: white;
  }
  .ico-close.armed {
    background: var(--danger);
    color: white;
    width: auto;
    padding: 0 14px;
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    animation: armPulse 1s ease-in-out infinite;
  }
  @keyframes armPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(225,84,84,0.5); }
    70%      { box-shadow: 0 0 0 10px rgba(225,84,84,0); }
  }
  .ico-close.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    border-color: var(--ink-faint);
    color: var(--ink-faint);
  }
  .ico-close.disabled:hover { background: transparent; color: var(--ink-faint); }

  /* used in mode-picker / setup state when not active yet */
  .setup-actions .ico-text {
    background: transparent;
    border: 1.5px solid var(--ink-faint);
    color: var(--ink-soft);
    cursor: pointer;
    height: 32px;
    padding: 0 14px;
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: all 0.16s;
  }
  .setup-actions .ico-text:hover { border-color: var(--coral); color: var(--coral); }
  .setup-actions .ico-text.primary {
    border-color: var(--coral);
    color: var(--coral);
  }
  .setup-actions .ico-text.primary:hover { background: var(--coral); color: var(--bg-deeper); }

  /* ===== GALLERY — portrait, floating, marquee ===== */
  .gal-bar {
    display: flex; align-items: center; gap: 12px;
    margin: 14px auto 12px;
    justify-content: center;          /* CENTER */
  }
  .gal-toggle {
    display: inline-flex;
    background: var(--bg);
    border-radius: 999px;
    padding: 4px;
    box-shadow: inset 3px 3px 7px var(--shadow-dark), inset -2px -2px 7px var(--shadow-light);
  }
  .gal-toggle button {
    background: transparent; border: none;
    cursor: pointer;
    padding: 8px 18px;
    font-family: 'Manrope', sans-serif;
    font-size: 10.5px; font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-radius: 999px;
  }
  .gal-toggle button.active { color: var(--coral); background: var(--bg-lift); box-shadow: 2px 2px 5px var(--shadow-dark); }
  .gal-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* gallery viewport — edges fade out via mask */
  .gallery-viewport {
    overflow: hidden;
    position: relative;
    min-height: 240px;
    padding: 8px 0;
    -webkit-mask-image: linear-gradient(90deg, transparent 0, black 40px, black calc(100% - 40px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, black 40px, black calc(100% - 40px), transparent 100%);
  }
  .gallery-viewport.empty {
    display: grid; place-items: center;
    -webkit-mask-image: none; mask-image: none;
  }
  .gallery-viewport.empty::before {
    content: attr(data-empty);
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* the actual scrolling row */
  .gallery-track {
    display: flex;
    gap: 14px;
    padding: 4px 8px;
    /* width is set inline based on item count */
    animation: marquee 60s linear infinite;
  }
  .gallery-track:hover { animation-play-state: paused; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }     /* track holds duplicated content so 50% = one full set */
  }

  .gal-item {
    position: relative;
    flex: 0 0 auto;
    width: 165px;
    aspect-ratio: 3 / 4;             /* portrait */
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 6px 6px 16px var(--shadow-dark), -4px -4px 14px var(--shadow-light);
    transition: transform 0.2s;
    background: var(--bg-lift);
  }
  .gal-item:hover { transform: translateY(-4px); }
  .gal-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  /* mode-source corner tag */
  .gal-tag {
    position: absolute;
    bottom: 8px; left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    color: var(--bg-deeper);
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .gal-tag.private { background: var(--coral); }
  .gal-tag.group   { background: var(--olive); }
  .gal-tag.public  { background: var(--mauve); }
  .gal-tag.mine    { background: var(--ink); color: var(--bg); }

  /* the small "→" send button on hover */
  .gal-send {
    position: absolute; top: 8px; right: 8px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(31, 26, 37, 0.85);
    color: var(--ink);
    border: none;
    font-size: 13px;
    cursor: pointer;
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .gal-item:hover .gal-send { display: flex; }
  .gal-send:hover { background: var(--coral); color: var(--bg-deeper); }

  /* ===== MODAL ===== */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(20, 16, 26, 0.78);
    backdrop-filter: blur(10px);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-back.open { display: flex; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg);
    border-radius: var(--r-lg);
    padding: 26px 22px;
    max-width: 420px;
    width: 100%;
    box-shadow: 14px 14px 36px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
    gap: 14px;
    align-items: center;
    animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 86vh;
    overflow-y: auto;
  }
  @keyframes popIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    font-weight: 800;
    color: var(--ink);
  }
  .modal-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
    font-weight: 700;
    text-align: center;
  }
  .qr-box {
    width: 200px; height: 200px;
    border-radius: var(--r-sm);
    padding: 14px;
    background: white;
    box-shadow: inset 4px 4px 10px var(--shadow-dark);
  }
  .qr-box canvas { width: 100%; height: 100%; }
  .id-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: var(--r-sm);
    background: var(--bg-lift);
    text-align: center;
    word-break: break-all;
    width: 100%;
  }
  .modal-img { max-width: 100%; max-height: 60vh; border-radius: var(--r-sm); }
  .modal input[type="text"], .modal select {
    background: var(--bg-deeper);
    border: none;
    border-radius: var(--r-sm);
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    width: 100%;
    font-weight: 600;
    box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4), inset -2px -2px 8px var(--shadow-light);
  }
  .modal-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .modal-big-av {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--coral), var(--olive));
    background-size: cover; background-position: center;
    color: var(--bg-deeper);
    display: grid; place-items: center;
    font-weight: 900;
    font-size: 36px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 6px 6px 14px var(--shadow-dark), -5px -5px 14px var(--shadow-light);
  }
  .modal-pill {
    background: transparent;
    border: 1.5px solid var(--ink-faint);
    color: var(--ink-soft);
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 999px;
    font-family: 'Manrope', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    transition: all 0.16s;
  }
  .modal-pill:hover { border-color: var(--coral); color: var(--coral); }
  .modal-pill.primary { border-color: var(--coral); color: var(--coral); }
  .modal-pill.primary:hover { background: var(--coral); color: var(--bg-deeper); }
  .modal-pill.danger { border-color: var(--danger); color: var(--danger); }
  .modal-pill.danger:hover { background: var(--danger); color: white; }

  .contact-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border-radius: var(--r-sm);
    background: var(--bg-lift);
    width: 100%;
  }
  .contact-mode {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    color: var(--bg-deeper);
    font-weight: 800;
    flex-shrink: 0;
  }
  .contact-mode.private { background: var(--coral); }
  .contact-mode.group   { background: var(--olive); }
  .contact-mode.public  { background: var(--mauve); }
  .contact-id {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .contact-list {
    width: 100%;
    display: flex; flex-direction: column; gap: 6px;
    max-height: 50vh; overflow-y: auto;
  }
  .empty-state {
    text-align: center;
    padding: 28px 12px;
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .hidden-file { display: none; }

  .toast {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%) translateY(-8px);
    padding: 11px 22px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="wrap">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="slot-left">
      <button class="contacts-btn" id="contacts-btn">
        contacts
        <span class="badge" id="contacts-count" style="display:none;">0</span>
      </button>
    </div>
    <div class="slot-mid">
      <div class="logo">P<span>2</span>P<span>C</span>.</div>
      <div class="logo-sub">fly-out from Lil World</div>
    </div>
    <div class="slot-right">
      <div class="me-cluster" id="me-cluster">
        <div class="av" id="me-av"><span id="me-init">M</span></div>
        <span class="id" id="me-id">me</span>
      </div>
    </div>
  </header>

  <!-- ACTIONS -->
  <div class="actions">
    <button class="action-btn primary" id="open-chat-btn">+ open chat</button>
    <button class="action-btn ghost" id="demo-btn">demo</button>
  </div>

  <!-- CHAT STACK -->
  <div class="stack" id="stack"></div>

  <!-- GALLERY -->
  <div class="gal-bar">
    <div class="gal-toggle">
      <button class="active" data-tab="myfiles">my files</button>
      <button data-tab="chats">from chats</button>
    </div>
    <span class="gal-count" id="gal-count"></span>
  </div>
  <div class="gallery-viewport" id="gallery-viewport" data-empty="no images yet"></div>

</div>

<!-- MODAL -->
<div class="modal-back" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<div class="toast" id="toast"></div>

<input type="file" accept="image/*" class="hidden-file" id="file-input">
<input type="file" accept="image/*" multiple class="hidden-file" id="myfiles-input">

<!-- ICON DEFS — used inline -->
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <symbol id="i-img" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></symbol>
    <symbol id="i-paste" viewBox="0 0 24 24"><path d="M9 4h6a2 2 0 0 1 2 2v0H7v0a2 2 0 0 1 2-2z"/><path d="M17 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></symbol>
    <symbol id="i-save" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></symbol>
    <symbol id="i-clear" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></symbol>
    <symbol id="i-add-peer" viewBox="0 0 24 24"><circle cx="9" cy="9" r="3"/><path d="M3 21a6 6 0 0 1 12 0M18 8v6M15 11h6"/></symbol>
    <symbol id="i-lock-open" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/></symbol>
    <symbol id="i-lock-closed" viewBox="0 0 24 24"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></symbol>
  </defs>
</svg>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
/* P2PC — fly-out from Lil World. Prototype layer.
   Logic: chats spawn on demand. Gallery is a horizontal marquee under the page.
   No real networking yet — TODO markers anchor where WebRTC plugs in. */

// TODO(ids): real identity scheme later
function makeId() {
  const adj = ['quiet','bright','calm','sharp','soft','quick','warm','still','wild','keen'];
  const noun = ['fox','river','stone','cloud','ember','pine','wave','moth','hawk','reed'];
  return `${adj[Math.floor(Math.random()*adj.length)]}-${noun[Math.floor(Math.random()*noun.length)]}-${Math.floor(Math.random()*9000)+1000}`;
}

let profile = loadProfile();
function loadProfile() {
  try { const p = JSON.parse(localStorage.getItem('p2pc_profile')); if (p && p.name) return p; } catch {}
  return { name: makeId(), avatar: null };
}
function saveProfile() { try { localStorage.setItem('p2pc_profile', JSON.stringify(profile)); } catch {} }
function ME() { return profile.name; }
function applyProfile() {
  const initial = (profile.name[0]||'m').toUpperCase();
  const av = document.getElementById('me-av');
  const init = document.getElementById('me-init');
  if (profile.avatar) { av.style.backgroundImage = `url(${profile.avatar})`; init.style.display='none'; }
  else { av.style.backgroundImage = ''; init.style.display=''; init.textContent = initial; }
  document.getElementById('me-id').textContent = profile.name;
}
applyProfile();
document.getElementById('me-cluster').addEventListener('click', openMeModal);

/* ──────── STATE ──────── */
let chatSeq = 0;
const chats = [];
/* myFiles: pre-uploaded by user. Each item: { src, source:'mine' } */
const myFiles = [];
/* chatImages: every image that flowed through a chat. Each: { src, source:mode } */
const chatImages = [];
let galleryTab = 'myfiles';
const contacts = [];

function newChat() {
  return {
    id: ++chatSeq,
    state: 'setup',
    mode: null,
    peers: [],
    messages: [],
    locked: false,
    confirmingClose: false,
    isDemo: false,
  };
}

const FAKE_NAMES = ['wild-hawk-3022','soft-cloud-7711','sharp-pine-4488','calm-reed-9012'];
function makeGradient(c1, c2, label) {
  const c = document.createElement('canvas'); c.width=180; c.height=240;     // portrait
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,180,240);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(0,0,180,240);
  ctx.fillStyle='rgba(255,240,220,0.92)'; ctx.font='italic bold 26px serif'; ctx.textAlign='center';
  ctx.fillText(label,90,130);
  return c.toDataURL();
}
const SAMPLE = [
  () => makeGradient('#e87c5b','#ff9d7e','dusk'),
  () => makeGradient('#93a06f','#c5b9a4','field'),
  () => makeGradient('#c89bd1','#f0e7d6','haze'),
  () => makeGradient('#6d7d4f','#93a06f','grove'),
  () => makeGradient('#9b4a2c','#e87c5b','ember'),
  () => makeGradient('#34293c','#c89bd1','dream'),
  () => makeGradient('#1f1a25','#93a06f','moss'),
  () => makeGradient('#8a4d6a','#e87c5b','ember II'),
];

function addChatImage(src, mode) {
  if (!chatImages.find(x => x.src === src)) chatImages.push({ src, source: mode });
}

function fakeSeed(c) {
  c.isDemo = true;
  const mode = c.mode;
  const add = (src) => { addChatImage(src, mode); return src; };
  if (mode === 'private') {
    const peer = c.peers[0];
    c.messages = [
      { system:true, text:'demo · private' },
      { from:peer, text:'works then' },
      { from:ME(), mine:true, text:'apparently' },
      { from:peer, image:add(SAMPLE[0]()) },
      { from:ME(), mine:true, text:'nice' },
      { from:peer, image:add(SAMPLE[5]()) },
    ];
  } else if (mode === 'group') {
    c.messages = [
      { system:true, text:`demo · ${c.peers.length} members` },
      { from:c.peers[0]||FAKE_NAMES[0], text:"who's around friday" },
      { from:c.peers[1]||FAKE_NAMES[1], text:'me' },
      { from:ME(), mine:true, text:'same' },
      { from:c.peers[2]||FAKE_NAMES[2], image:add(SAMPLE[1]()) },
      { from:c.peers[0]||FAKE_NAMES[0], image:add(SAMPLE[6]()) },
    ];
  } else {
    c.messages = [
      { system:true, text:'demo · public room' },
      { from:FAKE_NAMES[0], text:'new build feels off' },
      { from:FAKE_NAMES[2], image:add(SAMPLE[2]()) },
      { from:ME(), mine:true, text:'looks ok to me' },
      { from:FAKE_NAMES[3], image:add(SAMPLE[7]()) },
    ];
  }
}

/* ──────── BOOT — one demo chat ──────── */
function seedDemoChat() {
  const c = newChat();
  c.mode = 'private';
  c.peers = ['wild-hawk-3022'];
  fakeSeed(c);
  c.state = 'active';
  chats.push(c);
}
seedDemoChat();

/* ──────── RENDER ──────── */
function render() {
  renderStack();
  renderGallery();
  renderContactsBadge();
}

function renderStack() {
  const root = document.getElementById('stack');
  root.innerHTML = '';
  chats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'win' + (c.mode ? ' mode-' + c.mode : '');
    el.id = 'chat-' + c.id;
    el.appendChild(renderTop(c));
    if (c.state === 'setup')  el.appendChild(renderSetup(c));
    else                      el.appendChild(renderActive(c));
    root.appendChild(el);
  });
}

function renderTop(c) {
  const top = document.createElement('div');
  top.className = 'win-top';

  const dot = document.createElement('div');
  dot.className = 'win-mode-dot';
  top.appendChild(dot);

  const head = document.createElement('div');
  head.className = 'win-head';
  let titleTxt, titleEmpty = false, metaTxt;
  if (c.state === 'setup') {
    titleTxt = c.peers.length ? (c.peers.length===1 ? c.peers[0] : `${c.peers.length} peers`) : 'pick a mode';
    titleEmpty = !c.peers.length && !c.mode;
    metaTxt = c.mode ? `${c.mode} · setup` : 'setup';
  } else {
    titleTxt = c.mode==='public' ? c.peers[0] : (c.peers.length===1 ? c.peers[0] : `${c.peers.length} together`);
    metaTxt = `${c.mode} · ${c.peers.length===1?'1 peer':c.peers.length+' peers'}`;
  }
  head.innerHTML = `
    <div class="win-title ${titleEmpty?'empty':''}">${escapeHtml(titleTxt)}</div>
    <div class="win-meta">${escapeHtml(metaTxt)}</div>
  `;
  top.appendChild(head);

  if (c.isDemo && c.state === 'active') {
    const d = document.createElement('span');
    d.className = 'win-demo';
    d.textContent = 'demo';
    top.appendChild(d);
  }
  return top;
}

function renderSetup(c) {
  const wrap = document.createElement('div');

  // mode picker
  if (!c.mode) {
    const picker = document.createElement('div');
    picker.className = 'mode-picker';
    picker.innerHTML = `
      <div class="mode-tabs">
        <button data-mode="private">private</button>
        <button data-mode="group">group</button>
        <button data-mode="public">public</button>
      </div>
    `;
    picker.querySelectorAll('[data-mode]').forEach(b =>
      b.addEventListener('click', () => { c.mode = b.dataset.mode; render(); })
    );
    wrap.appendChild(picker);

    // close (outline)
    const ctrls = document.createElement('div');
    ctrls.className = 'win-ctrls';
    const sp = document.createElement('div'); sp.className = 'ico-spacer'; ctrls.appendChild(sp);
    ctrls.appendChild(makeIconBtn('close', 'remove', 'i-x', () => removeChat(c.id)));
    wrap.appendChild(ctrls);
    return wrap;
  }

  // mode chosen — show input + actions
  const multi = c.mode === 'group';
  const setup = document.createElement('div');
  setup.className = 'setup';
  setup.innerHTML = `
    <input type="text" placeholder="paste id, link, or pick from contacts" data-role="input">
    <div class="id-list" data-role="list"></div>
    <div class="setup-actions">
      <button class="ico-text" data-role="contacts">from contacts</button>
      <button class="ico-text" data-role="add">${multi?'+ add':'use'}</button>
      <button class="ico-text primary" data-role="connect">connect →</button>
    </div>
  `;
  const input = setup.querySelector('[data-role="input"]');
  const list = setup.querySelector('[data-role="list"]');
  const refresh = () => {
    list.innerHTML = c.peers.map((p,i) =>
      `<div class="id-chip"><span>${escapeHtml(p)}</span><span class="x" data-i="${i}">×</span></div>`
    ).join('');
    list.querySelectorAll('.x').forEach(x =>
      x.addEventListener('click', () => { c.peers.splice(+x.dataset.i, 1); refresh(); })
    );
  };
  refresh();
  setup.querySelector('[data-role="add"]').addEventListener('click', () => {
    const v = input.value.trim(); if (!v) return;
    if (!multi) c.peers = [v]; else if (!c.peers.includes(v)) c.peers.push(v);
    input.value = ''; refresh();
  });
  setup.querySelector('[data-role="connect"]').addEventListener('click', () => {
    const v = input.value.trim();
    if (v) { if (!multi) c.peers = [v]; else if (!c.peers.includes(v)) c.peers.push(v); }
    if (!c.peers.length) { input.placeholder = 'add at least one id'; input.focus(); return; }
    // TODO(webrtc): real signaling plugs in here.
    c.state = 'active'; c.isDemo = false;
    c.messages.push({system:true, text:`active · ${c.mode}`});
    toast('not wired · passthrough');
    render();
  });
  setup.querySelector('[data-role="contacts"]').addEventListener('click', () => openContactsForPicking(c));
  wrap.appendChild(setup);

  // controls — outline close
  const ctrls = document.createElement('div');
  ctrls.className = 'win-ctrls';
  const sp = document.createElement('div'); sp.className = 'ico-spacer'; ctrls.appendChild(sp);
  ctrls.appendChild(makeIconBtn('close', 'remove', 'i-x', () => removeChat(c.id)));
  wrap.appendChild(ctrls);

  return wrap;
}

function makeIconBtn(kind, title, symbol, onclick, extraClass='') {
  const b = document.createElement('button');
  let cls = 'ico-btn';
  if (kind === 'lock')  cls = 'ico-btn ico-lock';
  if (kind === 'close') cls = 'ico-btn ico-close';
  b.className = cls + (extraClass ? ' ' + extraClass : '');
  b.title = title;
  b.innerHTML = `<svg><use href="#${symbol}"></use></svg>`;
  b.addEventListener('click', onclick);
  return b;
}

function renderActive(c) {
  const wrap = document.createElement('div');

  // chat box
  const cb = document.createElement('div');
  cb.className = 'chat-wrap';
  cb.innerHTML = `
    <div class="messages" data-role="messages"></div>
    <div class="compose">
      <input type="text" placeholder="message" data-role="composer" autocomplete="off">
      <button class="send-btn" data-role="send" aria-label="send">→</button>
    </div>
  `;
  const msgsEl = cb.querySelector('[data-role="messages"]');
  const renderMsgs = () => {
    msgsEl.innerHTML = c.messages.map(m => {
      if (m.system) return `<div class="sys-msg">${escapeHtml(m.text)}</div>`;
      const cls = m.mine ? 'mine' : 'theirs';
      return `<div class="msg ${cls}">
        ${!m.mine ? `<div class="who">${escapeHtml(m.from)}</div>` : ''}
        ${m.image ? `<img src="${m.image}" class="msg-img" data-img="${m.image}">` : ''}
        ${m.text ? `<div>${escapeHtml(m.text)}</div>` : ''}
      </div>`;
    }).join('');
    msgsEl.querySelectorAll('.msg-img').forEach(img =>
      img.addEventListener('click', () => openImageModal(img.dataset.img))
    );
    msgsEl.scrollTop = msgsEl.scrollHeight;
  };
  renderMsgs();
  const composer = cb.querySelector('[data-role="composer"]');
  const send = () => {
    const t = composer.value.trim(); if (!t) return;
    c.messages.push({from:ME(),mine:true,text:t});
    composer.value = '';
    renderMsgs();
    if (c.isDemo && c.peers[0] && c.peers[0].startsWith('wild-hawk')) {
      setTimeout(() => { c.messages.push({from:c.peers[0], text:pickReply()}); renderMsgs(); }, 700 + Math.random()*600);
    }
  };
  cb.querySelector('[data-role="send"]').addEventListener('click', send);
  composer.addEventListener('keydown', e => { if (e.key==='Enter') send(); });
  wrap.appendChild(cb);

  // CONTROLS — outline icons only
  const ctrls = document.createElement('div');
  ctrls.className = 'win-ctrls';

  ctrls.appendChild(makeIconBtn('action', 'add image', 'i-img',   () => handleAction(c, 'add-image')));
  ctrls.appendChild(makeIconBtn('action', 'paste',     'i-paste', () => handleAction(c, 'paste')));
  ctrls.appendChild(makeIconBtn('action', 'save peers','i-save',  () => handleAction(c, 'save')));
  if (c.mode !== 'private')
    ctrls.appendChild(makeIconBtn('action', 'add peer', 'i-add-peer', () => handleAction(c, 'add-peer')));
  ctrls.appendChild(makeIconBtn('action', 'clear',     'i-clear', () => handleAction(c, 'clear')));

  // spacer pushes lock + close to the right
  const sp = document.createElement('div'); sp.className = 'ico-spacer'; ctrls.appendChild(sp);

  // LOCK
  const lockBtn = makeIconBtn('lock',
    c.locked ? 'unlock window' : 'lock window',
    c.locked ? 'i-lock-closed' : 'i-lock-open',
    () => handleAction(c, 'lock'),
    c.locked ? 'on' : ''
  );
  ctrls.appendChild(lockBtn);

  // CLOSE
  let closeBtn;
  if (c.confirmingClose) {
    closeBtn = document.createElement('button');
    closeBtn.className = 'ico-btn ico-close armed';
    closeBtn.textContent = 'tap again';
    closeBtn.addEventListener('click', () => handleAction(c, 'disconnect'));
  } else {
    const extra = c.locked ? 'disabled' : '';
    closeBtn = makeIconBtn('close',
      c.locked ? 'unlock first' : 'close',
      'i-x',
      () => handleAction(c, 'disconnect'),
      extra
    );
  }
  ctrls.appendChild(closeBtn);

  wrap.appendChild(ctrls);
  return wrap;
}

function handleAction(c, act) {
  if (act === 'lock') {
    c.locked = !c.locked; clearArm(c);
    toast(c.locked ? 'locked' : 'unlocked');
    render(); return;
  }
  if (act === 'disconnect') {
    if (c.locked) { toast('locked · unlock first'); return; }
    if (!c.confirmingClose) {
      c.confirmingClose = true;
      if (c._armTimer) clearTimeout(c._armTimer);
      c._armTimer = setTimeout(() => { c.confirmingClose = false; render(); }, 3000);
      render(); return;
    }
    clearArm(c);
    removeChat(c.id);
    return;
  }
  if (act === 'clear')     { c.messages = []; clearArm(c); render(); return; }
  if (act === 'add-image') { clearArm(c); triggerImageAdd(c); return; }
  if (act === 'paste')     { clearArm(c); triggerPaste(c); return; }
  if (act === 'save')      { clearArm(c); saveCurrentAsContacts(c); return; }
  if (act === 'add-peer') {
    clearArm(c);
    const v = prompt('peer id:');
    if (v && v.trim() && !c.peers.includes(v.trim())) {
      c.peers.push(v.trim());
      c.messages.push({system:true, text:`${v.trim()} joined`});
      render();
    }
  }
}
function clearArm(c) {
  if (c.confirmingClose) {
    c.confirmingClose = false;
    if (c._armTimer) { clearTimeout(c._armTimer); c._armTimer = null; }
  }
}
function removeChat(id) {
  const i = chats.findIndex(x => x.id === id);
  if (i >= 0) { chats.splice(i, 1); render(); }
}
function saveCurrentAsContacts(c) {
  let added = 0;
  // TODO(contacts-schema): also persist offer/pubkey for re-connect later.
  c.peers.forEach(p => {
    if (!contacts.find(x => x.id===p && x.mode===c.mode)) { contacts.push({id:p, mode:c.mode}); added++; }
  });
  c.messages.push({system:true, text: added ? `saved ${added}` : 'already saved'});
  render();
}

function triggerImageAdd(c) {
  const fi = document.getElementById('file-input');
  fi.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = ev => {
      addChatImage(ev.target.result, c.mode);
      c.messages.push({from:ME(),mine:true,image:ev.target.result});
      render();
    };
    r.readAsDataURL(f); fi.value = '';
  };
  fi.click();
}
async function triggerPaste(c) {
  try {
    if (navigator.clipboard.read) {
      const items = await navigator.clipboard.read();
      for (const item of items) for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          const r = new FileReader();
          r.onload = ev => {
            addChatImage(ev.target.result, c.mode);
            c.messages.push({from:ME(),mine:true,image:ev.target.result});
            render();
          };
          r.readAsDataURL(blob); return;
        }
      }
    }
    const text = await navigator.clipboard.readText();
    if (text) { c.messages.push({from:ME(),mine:true,text}); render(); }
  } catch { c.messages.push({system:true, text:'paste blocked'}); render(); }
}
function pickReply() {
  const r = ['for real','lol','hmm','yep','send another','nice','wait what','bet','no way','word'];
  return r[Math.floor(Math.random()*r.length)];
}

/* ──────── ACTION BUTTONS ──────── */
document.getElementById('open-chat-btn').addEventListener('click', () => {
  const c = newChat();
  chats.push(c);
  render();
  setTimeout(() => { const el = document.getElementById('chat-' + c.id); if (el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
});
document.getElementById('demo-btn').addEventListener('click', () => {
  const modes = ['private', 'group', 'public'];
  const last = chats.filter(x => x.isDemo).slice(-1)[0];
  const nextMode = last ? modes[(modes.indexOf(last.mode) + 1) % 3] : 'private';
  const c = newChat();
  c.mode = nextMode;
  if (nextMode === 'private') c.peers = ['wild-hawk-3022'];
  else if (nextMode === 'group') c.peers = ['wild-hawk-3022','soft-cloud-7711','sharp-pine-4488'];
  else c.peers = ['public://gradient-club'];
  fakeSeed(c);
  c.state = 'active';
  chats.push(c);
  render();
  setTimeout(() => { const el = document.getElementById('chat-' + c.id); if (el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
});

/* ──────── GALLERY — marquee, portrait, mode-tagged ──────── */
function renderGallery() {
  const view = document.getElementById('gallery-viewport');
  const src = galleryTab==='myfiles' ? myFiles : chatImages;

  if (!src.length) {
    view.classList.add('empty');
    view.dataset.empty = galleryTab==='myfiles' ? 'your files appear here' : 'no images shared yet';
    view.innerHTML = '';
    document.getElementById('gal-count').textContent = '';
    return;
  }
  view.classList.remove('empty');
  view.dataset.empty = '';

  // Build the items HTML and duplicate it for seamless marquee
  const itemsHtml = src.map((it,i) => buildGalItem(it, i, src)).join('');
  const itemCount = src.length;
  // duration scales with item count so speed feels consistent regardless
  const dur = Math.max(20, itemCount * 6);

  view.innerHTML = `<div class="gallery-track" style="animation-duration:${dur}s;">${itemsHtml}${itemsHtml}</div>`;
  // wire events on both copies
  view.querySelectorAll('img').forEach(img =>
    img.addEventListener('click', () => openImageModal(img.dataset.src))
  );
  view.querySelectorAll('.gal-send').forEach(b =>
    b.addEventListener('click', e => { e.stopPropagation(); sendImageToOpenChat(b.dataset.src); })
  );

  document.getElementById('gal-count').textContent = itemCount;
}
function buildGalItem(it, i) {
  const src = it.src;
  const source = it.source || 'mine';
  const tagClass = source === 'mine' ? 'mine' : source;
  const tagLabel = source === 'mine' ? 'mine' : source;
  return `<div class="gal-item">
    <img src="${src}" data-src="${src}" alt="">
    <button class="gal-send" data-src="${src}" title="send →">→</button>
    <span class="gal-tag ${tagClass}">${tagLabel}</span>
  </div>`;
}
function sendImageToOpenChat(img) {
  const target = chats.find(c => c.state==='active');
  if (!target) { toast('no active chat'); return; }
  target.messages.push({from:ME(),mine:true,image:img});
  addChatImage(img, target.mode);
  render(); toast('sent →');
}
document.querySelectorAll('.gal-toggle button').forEach(b =>
  b.addEventListener('click', () => {
    document.querySelectorAll('.gal-toggle button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    galleryTab = b.dataset.tab;
    renderGallery();
  })
);

/* ──────── CONTACTS ──────── */
function renderContactsBadge() {
  const b = document.getElementById('contacts-count');
  if (contacts.length) { b.style.display = 'inline-block'; b.textContent = contacts.length; }
  else b.style.display = 'none';
}
function openContactsModal() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>contacts</h3>
    ${contacts.length
      ? `<div class="contact-list">
          ${contacts.map((c,i) => `
            <div class="contact-row">
              <span class="contact-mode ${c.mode}">${c.mode}</span>
              <span class="contact-id">${escapeHtml(c.id)}</span>
              <button class="modal-pill" data-use="${i}">use</button>
              <button class="modal-pill danger" data-del="${i}">×</button>
            </div>
          `).join('')}
         </div>`
      : '<div class="empty-state">no contacts yet · save peers from a chat</div>'
    }
    <div class="modal-row">
      <button class="modal-pill" id="contact-add-btn">+ add manually</button>
      <button class="modal-pill" id="modal-close">close</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  body.querySelectorAll('[data-use]').forEach(b =>
    b.addEventListener('click', () => { useContact(contacts[+b.dataset.use]); closeModal(); })
  );
  body.querySelectorAll('[data-del]').forEach(b =>
    b.addEventListener('click', () => { contacts.splice(+b.dataset.del, 1); render(); openContactsModal(); })
  );
  document.getElementById('contact-add-btn').addEventListener('click', openAddContact);
  document.getElementById('modal-close').addEventListener('click', closeModal);
}
function openAddContact() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>add contact</h3>
    <select id="c-mode">
      <option value="private">private</option>
      <option value="group">group</option>
      <option value="public">public</option>
    </select>
    <input type="text" id="c-id" placeholder="id, link, or room name">
    <div class="modal-row">
      <button class="modal-pill" id="c-cancel">back</button>
      <button class="modal-pill primary" id="c-save">save</button>
    </div>
  `;
  document.getElementById('c-cancel').addEventListener('click', openContactsModal);
  document.getElementById('c-save').addEventListener('click', () => {
    const id = document.getElementById('c-id').value.trim();
    const mode = document.getElementById('c-mode').value;
    if (!id) return;
    if (!contacts.find(c => c.id===id && c.mode===mode)) contacts.push({id, mode});
    render(); openContactsModal();
  });
}
function openContactsForPicking(c) {
  if (!contacts.length) { toast('no saved contacts'); return; }
  const filtered = contacts.filter(x => x.mode===c.mode || c.mode==='group');
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>pick contact</h3>
    <div class="contact-list">
      ${filtered.length
        ? filtered.map(x => `<div class="contact-row" data-id="${escapeHtml(x.id)}" style="cursor:pointer;"><span class="contact-mode ${x.mode}">${x.mode}</span><span class="contact-id">${escapeHtml(x.id)}</span></div>`).join('')
        : '<div class="empty-state">no matching contacts</div>'}
    </div>
    <button class="modal-pill" id="modal-close">cancel</button>
  `;
  document.getElementById('modal').classList.add('open');
  body.querySelectorAll('[data-id]').forEach(row =>
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      if (c.mode==='group') { if (!c.peers.includes(id)) c.peers.push(id); } else c.peers = [id];
      closeModal(); render();
    })
  );
  document.getElementById('modal-close').addEventListener('click', closeModal);
}
function useContact(contact) {
  const c = newChat();
  c.mode = contact.mode;
  c.peers = [contact.id];
  chats.push(c);
  render();
  setTimeout(() => { const el = document.getElementById('chat-' + c.id); if (el) el.scrollIntoView({behavior:'smooth', block:'center'}); }, 50);
}
document.getElementById('contacts-btn').addEventListener('click', openContactsModal);

/* ──────── ME / SHARE QR ──────── */
function openMeModal() {
  const body = document.getElementById('modal-body');
  body.innerHTML = `
    <h3>you</h3>
    <div class="modal-big-av" id="prof-av">${profile.avatar ? '' : `<span>${(profile.name[0]||'M').toUpperCase()}</span>`}</div>
    <div class="modal-sub">tap avatar to change</div>
    <input type="text" id="prof-name" value="${escapeHtml(profile.name)}" placeholder="your handle" maxlength="32">
    <div class="qr-box"><canvas id="qr"></canvas></div>
    <div class="id-display">${escapeHtml(profile.name)}</div>
    <div class="modal-sub">share via QR</div>
    <div class="modal-row">
      <button class="modal-pill" id="prof-cancel">cancel</button>
      ${profile.avatar?'<button class="modal-pill danger" id="prof-clear">remove pic</button>':''}
      <button class="modal-pill primary" id="prof-save">save</button>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  const av = document.getElementById('prof-av');
  if (profile.avatar) av.style.backgroundImage = `url(${profile.avatar})`;
  av.addEventListener('click', () => {
    const fi = document.createElement('input'); fi.type='file'; fi.accept='image/*';
    fi.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => { av.style.backgroundImage=`url(${ev.target.result})`; av.innerHTML=''; av.dataset.newAvatar=ev.target.result; };
      r.readAsDataURL(f);
    };
    fi.click();
  });
  QRCode.toCanvas(document.getElementById('qr'), profile.name, {
    width: 184, margin: 1,
    color: { dark:'#1f1a25', light:'#ffffff' }
  });
  document.getElementById('prof-cancel').addEventListener('click', closeModal);
  document.getElementById('prof-save').addEventListener('click', () => {
    profile.name = document.getElementById('prof-name').value.trim() || profile.name;
    if (av.dataset.newAvatar) profile.avatar = av.dataset.newAvatar;
    saveProfile(); applyProfile(); closeModal(); render();
  });
  const clr = document.getElementById('prof-clear');
  if (clr) clr.addEventListener('click', () => { profile.avatar = null; saveProfile(); applyProfile(); closeModal(); render(); });
}

function openImageModal(src) {
  const body = document.getElementById('modal-body');
  body.innerHTML = `<img src="${src}" class="modal-img"><button class="modal-pill" id="modal-close">close</button>`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-close').addEventListener('click', closeModal);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

let toastTimer;
function toast(text) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

render();
</script>
